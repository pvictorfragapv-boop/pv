<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paolla & Paulo — 13.07.2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --marrom:        #130706;
      --marrom-claro:  #6B2D1A;
      --creme:         #F3EBE0;
      --creme-escuro:  #E2D0BB;
      --dourado:       #C9A96E;
      --dourado-claro: #E8D4A8;
      --branco:        #FAF6F0;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--branco); color: var(--marrom); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }

    #hero {
      min-height: 100vh;
      background: var(--marrom);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 80px 24px 0;
      position: relative; overflow: hidden;
    }
    .hero-content { position: relative; z-index: 2; padding-bottom: 250px; }

    .monogram img {
      height: 70px; width: auto;
      filter: brightness(0) saturate(100%) invert(72%) sepia(38%) saturate(600%) hue-rotate(5deg) brightness(1.15);
      opacity: 0.85; margin-bottom: 18px;
    }

    .hero-pre {
      font-family: 'Cinzel', serif; font-size: 10px;
      letter-spacing: 0.45em; color: var(--dourado); text-transform: uppercase;
      margin-bottom: 24px;
    }

    .hero-names-img {
      display: block; margin: 0 auto;
      width: min(780px, 92vw);
      filter: brightness(0) invert(1);
      opacity: 0.96;
    }

    .hero-date {
      font-family: 'Cinzel', serif; font-size: 16px;
      letter-spacing: 0.3em; color: var(--dourado-claro); margin-top: 28px;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(19,7,6,0.97); border-bottom: 1px solid rgba(201,169,110,0.12);
    }
    nav ul { display: flex; justify-content: center; gap: 15px; list-style: none; padding: 14px; flex-wrap: wrap; }
    nav a { font-family: 'Cinzel', serif; font-size: 9px; color: var(--dourado-claro); text-decoration: none; text-transform: uppercase; }

    section { padding: 80px 24px; text-align: center; }
    .sec-title { font-size: 40px; font-weight: 300; margin-bottom: 30px; }

    .venue-house-img {
      display: block; max-width: 100%; width: 450px; margin: 0 auto 36px;
      filter: brightness(0) invert(1) sepia(1) saturate(0.4) hue-rotate(5deg) brightness(0.9);
      opacity: 0.7;
    }

    footer { background: var(--marrom); padding: 50px 24px; text-align: center; color: white; }
    .footer-sig { height: 60px; filter: brightness(0) invert(1); opacity: 0.5; margin-bottom: 15px; }

    .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s all; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<section id="hero">
  <div class="hero-content">
    <div class="monogram">
      <img src="1000161307-removebg-preview.png" alt="PP" />
    </div>
    <p class="hero-pre">Celebração do Matrimônio</p>
    <img src="1000161307-removebg-preview.png" alt="Paolla e Paulo" class="hero-names-img" />
    <p class="hero-date">13 · 07 · 2026</p>
  </div>
</section>

<nav>
  <ul>
    <li><a href="#cerimonia">Programação</a></li>
    <li><a href="#traje">Traje</a></li>
    <li><a href="#local">Local</a></li>
  </ul>
</nav>

<section id="local" style="background: #130706; color: #F3EBE0;">
  <h2 class="sec-title">O <em>Local</em></h2>
  <img src="1000161285-removebg-preview.png" alt="Casa Ville Verte" class="venue-house-img" />
  <p>Casa Ville Verte, Teresópolis - RJ</p>
</section>

<footer>
  <img src="1000161307-removebg-preview.png" class="footer-sig" />
  <p>13.07.2026</p>
</footer>

<script>
  document.querySelectorAll('.reveal').forEach(el => {
    new IntersectionObserver(([e]) => {
      if (e.isIntersecting) e.target.classList.add('visible');
    }, { threshold: 0.1 }).observe(el);
  });
</script>
</body>
</html>
