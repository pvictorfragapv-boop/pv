  <style>
    :root {
      --marrom:        #130706;
      --marrom-medio:  #2A0F0C;
      --marrom-claro:  #6B2D1A;
      --creme:         #F3EBE0;
      --creme-escuro:  #E2D0BB;
      --dourado:       #C9A96E;
      --dourado-claro: #E8D4A8;
      --branco:        #FAF6F0;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--branco); color: var(--marrom); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }

    /* \u2500\u2500 HERO \u2500\u2500 */
    #hero {
      min-height: 100vh;
      background: var(--marrom);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 80px 24px 0;
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 10%, rgba(201,169,110,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 100% 40% at 50% 100%, rgba(61,24,16,0.9) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Serra dos \u00d3rg\u00e3os SVG \u2014 full bottom strip */
    .serra-hero {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: clamp(220px, 38vw, 380px);
      pointer-events: none;
      z-index: 1;
    }

    .hero-content { position: relative; z-index: 2; padding-bottom: clamp(200px,34vw,360px); }

    /* Monograma PP */
    .monogram {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(38px, 7vw, 58px);
      color: var(--dourado);
      opacity: 0.85;
      line-height: 1;
      margin-bottom: 18px;
      opacity: 0; animation: fadeUp 1s 0.2s forwards;
    }

    .hero-pre {
      font-family: 'Cinzel', serif; font-size: clamp(9px,1.8vw,11px);
      letter-spacing: 0.45em; color: var(--dourado); text-transform: uppercase;
      margin-bottom: 24px; opacity: 0; animation: fadeUp 1s 0.4s forwards;
    }

    /* Names in Pinyon Script like the save the date */
    .hero-names {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(72px, 16vw, 158px);
      font-weight: 400;
      line-height: 0.85;
      color: #ffffff;
      opacity: 0; animation: fadeUp 1.2s 0.6s forwards;
    }
    .hero-names .connector {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(38px, 8vw, 76px);
      color: var(--dourado);
      display: block;
      line-height: 1.1;
      letter-spacing: 0.05em;
    }
    .hero-rule {
      width: 1px; height: 64px;
      background: linear-gradient(to bottom, transparent, var(--dourado), transparent);
      margin: 28px auto; opacity: 0; animation: fadeIn 1s 1.2s forwards;
    }
