<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paolla & Paulo — 13.07.2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --marrom: #130706;
      --dourado: #C9A96E;
      --dourado-claro: #E8D4A8;
      --branco: #FAF6F0;
    }
    body { background: var(--branco); margin: 0; font-family: 'Cormorant Garamond', serif; }
    #hero {
      min-height: 100vh;
      background: var(--marrom);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: white;
    }
    .hero-names-img {
      width: min(700px, 90vw);
      filter: brightness(0) invert(1); /* Força a imagem preta a ficar branca */
      display: block;
      margin: 20px auto;
    }
    .venue-house-img {
      width: min(500px, 80vw);
      filter: brightness(0) invert(1) sepia(1) saturate(0.5); /* Efeito dourado/claro */
      display: block;
      margin: 20px auto;
    }
    section { padding: 60px 20px; text-align: center; }
  </style>
</head>
<body>

<section id="hero">
  <img src="./1000161307-removebg-preview.png" alt="Paolla e Paulo" class="hero-names-img" />
  <p style="font-family: 'Cinzel'; letter-spacing: 0.3em; color: var(--dourado-claro);">13 · 07 · 2026</p>
</section>

<section id="local" style="background: var(--marrom); color: white;">
  <h2 style="font-family: 'Cinzel';">O Local</h2>
  <img src="./1000161285-removebg-preview.png" alt="Casa Ville Verte" class="venue-house-img" />
  <p>Casa Ville Verte · Teresópolis, RJ</p>
</section>

</body>
</html>
